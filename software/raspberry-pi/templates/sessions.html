<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <title>Past Sessions - Lame Data</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <style>
        .session-card {
            padding: 1rem;
            margin: 0.75rem 0;
            border-radius: var(--pico-border-radius);
            border-left: 4px solid var(--pico-primary);
            background: var(--pico-card-background-color);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .session-card:hover {
            transform: translateX(4px);
            box-shadow: var(--pico-box-shadow);
        }
        .session-card.selected {
            border-left-color: var(--pico-contrast);
            background: color-mix(in srgb, var(--pico-primary) 10%, var(--pico-card-background-color));
        }
        .session-checkbox {
            margin-top: 0.15rem;
            flex-shrink: 0;
            width: 1.1rem;
            height: 1.1rem;
            cursor: pointer;
        }
        .session-content {
            flex: 1;
            min-width: 0;
        }
        .session-location {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        .session-notes {
            color: var(--pico-muted-color);
            margin-bottom: 0.5rem;
        }
        .session-meta {
            font-size: 0.85rem;
            color: var(--pico-muted-color);
        }
        .session-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .session-actions button {
            margin: 0;
            padding: 0.3rem 0.75rem;
            font-size: 0.8rem;
        }
        .upload-form {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .upload-form input {
            margin: 0;
            padding: 0.3rem 0.5rem;
            font-size: 0.85rem;
            max-width: 180px;
        }
        .upload-form button {
            margin: 0;
            padding: 0.3rem 0.75rem;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .upload-progress {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }
        .upload-progress progress {
            margin: 0;
            height: 6px;
        }
        .no-sessions {
            text-align: center;
            padding: 3rem;
            color: var(--pico-muted-color);
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--pico-card-background-color);
            border-top: 2px solid var(--pico-primary);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            z-index: 100;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.3);
        }
        .action-bar button {
            margin: 0;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
        }
        .action-bar span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>Past Sessions</h1>
            <nav>
                <ul>
                    <li><a href="/">Back to Recorder</a></li>
                </ul>
            </nav>
        </header>

        <article>
            <div id="sessionsList" aria-busy="true">Loading sessions...</div>
        </article>

        <footer>
            <small>Lame Data - Open Source Horse Biomechanics</small>
        </footer>
    </main>

    <div class="action-bar" id="actionBar" style="display:none">
        <span id="selectedCount">0 selected</span>
        <button onclick="downloadSelected()">Download Selected</button>
        <button class="secondary" onclick="toggleSelectAll()" id="selectAllBtn">Select All</button>
        <button class="secondary outline" onclick="clearSelection()">Clear</button>
    </div>

    <script>
        let cloudConfigured = false;
        const selected = new Set();
        let allFilenames = [];

        function checkCloudStatus() {
            return fetch('/api/cloud_status')
                .then(r => r.json())
                .then(data => { cloudConfigured = data.configured; })
                .catch(() => { cloudConfigured = false; });
        }

        function updateActionBar() {
            const bar = document.getElementById('actionBar');
            const count = selected.size;
            bar.style.display = count > 0 ? 'flex' : 'none';
            document.getElementById('selectedCount').textContent =
                count + ' selected';
            document.getElementById('selectAllBtn').textContent =
                count === allFilenames.length ? 'Deselect All' : 'Select All';
        }

        function toggleSelect(filename, event) {
            event.stopPropagation();
            const card = document.querySelector(`[data-filename="${filename}"]`);
            if (selected.has(filename)) {
                selected.delete(filename);
                card.classList.remove('selected');
                card.querySelector('.session-checkbox').checked = false;
            } else {
                selected.add(filename);
                card.classList.add('selected');
                card.querySelector('.session-checkbox').checked = true;
            }
            updateActionBar();
        }

        function toggleSelectAll() {
            if (selected.size === allFilenames.length) {
                clearSelection();
            } else {
                allFilenames.forEach(f => {
                    selected.add(f);
                    const card = document.querySelector(`[data-filename="${f}"]`);
                    if (card) {
                        card.classList.add('selected');
                        card.querySelector('.session-checkbox').checked = true;
                    }
                });
                updateActionBar();
            }
        }

        function clearSelection() {
            selected.clear();
            document.querySelectorAll('.session-card').forEach(card => {
                card.classList.remove('selected');
                card.querySelector('.session-checkbox').checked = false;
            });
            updateActionBar();
        }

        function downloadSelected() {
            if (selected.size === 0) return;

            if (selected.size === 1) {
                window.location.href = '/api/download/' + [...selected][0];
                return;
            }

            fetch('/api/download_batch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({filenames: [...selected]})
            })
            .then(r => r.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'sessions.zip';
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function loadSessions() {
            fetch('/api/sessions')
                .then(response => response.json())
                .then(sessions => {
                    const container = document.getElementById('sessionsList');
                    container.removeAttribute('aria-busy');

                    if (sessions.length === 0) {
                        container.innerHTML = '<div class="no-sessions">No sessions recorded yet</div>';
                        return;
                    }

                    allFilenames = sessions.map(s => s.filename);
                    let html = '';
                    sessions.forEach(session => {
                        const meta = session.metadata || {};
                        const date = new Date(session.modified).toLocaleString();
                        const location = (meta.location || 'unknown').replace(/_/g, ' ');
                        const safeFilename = session.filename.replace(/'/g, "\\'");

                        html += `
                            <div class="session-card" data-filename="${session.filename}" onclick="viewSession('${safeFilename}')">
                                <input type="checkbox" class="session-checkbox" onclick="toggleSelect('${safeFilename}', event)">
                                <div class="session-content">
                                    <div class="session-location">${location}</div>
                                    <div class="session-notes">${meta.notes || 'No notes'}</div>
                                    <div class="session-meta">
                                        ${date} &bull;
                                        ${meta.samples ? Number(meta.samples).toLocaleString() : 'Unknown'} samples &bull;
                                        ${(session.size / 1024).toFixed(1)} KB
                                    </div>
                                    ${cloudConfigured ? `
                                    <div class="session-actions" onclick="event.stopPropagation()">
                                        <div id="upload-area-${safeFilename}">
                                            <button onclick="showUploadForm('${safeFilename}')">Send to Cloud</button>
                                        </div>
                                    </div>` : ''}
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML = html;
                });
        }

        function showUploadForm(filename) {
            const area = document.getElementById('upload-area-' + filename);
            area.innerHTML = `
                <div class="upload-form">
                    <input type="text" id="horse-name-${filename}" placeholder="Horse name (optional)">
                    <button onclick="startUpload('${filename}')">Upload</button>
                    <button class="secondary" onclick="cancelUploadForm('${filename}')">Cancel</button>
                </div>
            `;
        }

        function cancelUploadForm(filename) {
            const area = document.getElementById('upload-area-' + filename);
            area.innerHTML = `<button onclick="showUploadForm('${filename}')">Send to Cloud</button>`;
        }

        function startUpload(filename) {
            const horseName = document.getElementById('horse-name-' + filename).value;
            const area = document.getElementById('upload-area-' + filename);
            area.innerHTML = `
                <div class="upload-progress">
                    <progress id="progress-${filename}" value="0" max="100"></progress>
                    <small id="progress-text-${filename}">Starting...</small>
                </div>
            `;

            fetch('/api/upload/' + filename, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({horse_name: horseName})
            }).then(() => pollUploadStatus(filename));
        }

        function pollUploadStatus(filename) {
            const interval = setInterval(() => {
                fetch('/api/upload_status/' + filename)
                    .then(r => r.json())
                    .then(state => {
                        const progress = document.getElementById('progress-' + filename);
                        const text = document.getElementById('progress-text-' + filename);
                        if (!progress) { clearInterval(interval); return; }

                        progress.value = state.progress;
                        text.textContent = state.status === 'complete' ? 'Uploaded!'
                            : state.status === 'error' ? 'Error: ' + state.error
                            : state.status + ' (' + state.progress + '%)';

                        if (state.status === 'complete' || state.status === 'error') {
                            clearInterval(interval);
                        }
                    });
            }, 500);
        }

        function viewSession(filename) {
            window.location.href = `/view/${filename}`;
        }

        checkCloudStatus().then(() => loadSessions());
    </script>
</body>
</html>
