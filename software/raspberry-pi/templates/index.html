<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <title>Lame Data</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <style>
        /* Custom status indicator styles */
        .status-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem;
            border-radius: var(--pico-border-radius);
            text-align: center;
            margin: 1rem 0;
        }
        .status-recording {
            background: var(--pico-primary-background);
            color: var(--pico-primary-inverse);
        }
        .status-stopped {
            background: #C44638;
            color: white;
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--pico-muted-border-color);
        }
        .metric-row:last-child {
            border-bottom: none;
        }
        .device-card {
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: var(--pico-border-radius);
            border-left: 4px solid var(--pico-primary);
        }
        .device-connected {
            background: var(--pico-card-background-color);
            border-left-color: #2ecc71;
        }
        .device-disconnected {
            background: #2a2a2a;
            border-left-color: #C44638;
        }
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .device-config-card {
            padding: 1rem;
            border-radius: var(--pico-border-radius);
            background: var(--pico-card-background-color);
            border: 2px solid var(--pico-muted-border-color);
        }
        .device-config-card.connected {
            border-color: #2ecc71;
        }
        .device-config-card.disconnected {
            border-color: #C44638;
            opacity: 0.6;
        }
        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .device-title {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .battery-info {
            font-size: 0.9rem;
            color: var(--pico-muted-color);
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-stop {
            --pico-background-color: #C44638;
            --pico-border-color: #C44638;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        header h1 {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>Lame Data</h1>
            <nav>
                <ul>
                    <li><a href="/sessions">View Past Sessions</a></li>
                </ul>
            </nav>
        </header>

        <article>
            <div id="status" class="status-indicator status-stopped">NOT RECORDING</div>

            <div id="metrics" style="display:none;">
                <div class="metric-row">
                    <span>Duration:</span>
                    <strong id="duration">0s</strong>
                </div>
                <div class="metric-row">
                    <span>Samples:</span>
                    <strong id="samples">0</strong>
                </div>
            </div>
        </article>

        <article>
            <header>
                <h2>Device Configuration</h2>
            </header>
            <div id="deviceGrid" class="device-grid">
                <!-- Device cards will be dynamically populated -->
            </div>
            <button onclick="saveDeviceConfig()">Save Configuration</button>
        </article>

        <article>
            <header>
                <h2>Session Info</h2>
            </header>

            <label for="location">Session Location</label>
            <input type="text" id="location" placeholder="e.g., Indoor arena, outdoor field" value="field">

            <label for="notes">Notes</label>
            <textarea id="notes" rows="3" placeholder="e.g., Walk in hand, Trot in hand, Lunge left, etc."></textarea>

            <div class="btn-group">
                <button id="startBtn" onclick="startRecording()">Start Recording</button>
                <button id="stopBtn" class="btn-stop" onclick="stopRecording()" disabled>Stop Recording</button>
            </div>
        </article>

        <footer>
            <small>Lame Data - Open Source Horse Biomechanics</small>
        </footer>
    </main>

    <script>
        let isRecording = false;
        let deviceConfig = null;
        let availablePositions = [];

        // Load device configuration on page load
        async function loadDeviceConfig() {
            const response = await fetch('/api/device_config');
            deviceConfig = await response.json();
            availablePositions = deviceConfig.positions || [];
            renderDeviceGrid();
        }

        function renderDeviceGrid() {
            const grid = document.getElementById('deviceGrid');
            if (!deviceConfig) return;

            // Show cards for devices 1-5
            let html = '';
            for (let i = 1; i <= 5; i++) {
                const deviceId = i.toString();
                const device = deviceConfig.devices[deviceId] || { position: '', color: '#999' };

                html += `
                    <div class="device-config-card" id="device-card-${deviceId}">
                        <div class="device-header">
                            <span class="device-title">Device ${deviceId}</span>
                            <span class="battery-info" id="battery-${deviceId}">--</span>
                        </div>
                        <label for="position-${deviceId}">Position</label>
                        <select id="position-${deviceId}" data-device="${deviceId}">
                            <option value="">Not in use</option>
                            ${availablePositions.map(pos =>
                                `<option value="${pos.id}" ${device.position === pos.id ? 'selected' : ''}>${pos.label}</option>`
                            ).join('')}
                        </select>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        async function saveDeviceConfig() {
            if (!deviceConfig) return;

            // Collect positions from dropdowns
            for (let i = 1; i <= 5; i++) {
                const deviceId = i.toString();
                const select = document.getElementById(`position-${deviceId}`);
                const position = select.value;

                if (position) {
                    // Use existing color or assign a default
                    const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF'];
                    deviceConfig.devices[deviceId] = {
                        position: position,
                        color: deviceConfig.devices[deviceId]?.color || colors[i - 1]
                    };
                } else {
                    // Remove device if position is empty
                    delete deviceConfig.devices[deviceId];
                }
            }

            // Save to server
            const response = await fetch('/api/device_config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(deviceConfig)
            });

            if (response.ok) {
                alert('Configuration saved!');
            }
        }

        function updateStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    isRecording = data.is_recording;

                    const statusDiv = document.getElementById('status');
                    if (isRecording) {
                        statusDiv.textContent = 'RECORDING';
                        statusDiv.className = 'status-indicator status-recording';
                        document.getElementById('metrics').style.display = 'block';
                        document.getElementById('duration').textContent = Math.floor(data.duration) + 's';
                        document.getElementById('samples').textContent = data.samples_received.toLocaleString();
                    } else {
                        statusDiv.textContent = 'NOT RECORDING';
                        statusDiv.className = 'status-indicator status-stopped';
                        document.getElementById('metrics').style.display = 'none';
                    }

                    document.getElementById('startBtn').disabled = isRecording;
                    document.getElementById('stopBtn').disabled = !isRecording;
                    document.getElementById('location').disabled = isRecording;
                    document.getElementById('notes').disabled = isRecording;

                    // Update device card statuses
                    for (let i = 1; i <= 5; i++) {
                        const deviceId = i.toString();
                        const card = document.getElementById(`device-card-${deviceId}`);
                        const batterySpan = document.getElementById(`battery-${deviceId}`);

                        if (data.device_status[deviceId]) {
                            const status = data.device_status[deviceId];
                            card.classList.toggle('connected', status.connected);
                            card.classList.toggle('disconnected', !status.connected);

                            if (status.connected) {
                                batterySpan.textContent = `${status.percent.toFixed(0)}%`;
                            } else {
                                batterySpan.textContent = 'Offline';
                            }
                        } else {
                            card.classList.remove('connected');
                            card.classList.add('disconnected');
                            batterySpan.textContent = '--';
                        }
                    }
                });
        }

        function startRecording() {
            const location = document.getElementById('location').value;
            const notes = document.getElementById('notes').value;

            fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({location, notes})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    updateStatus();
                }
            });
        }

        function stopRecording() {
            fetch('/api/stop', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`Recording stopped!\nDuration: ${Math.floor(data.duration)}s\nSamples: ${data.samples_recorded.toLocaleString()}`);
                    updateStatus();
                }
            });
        }

        // Initialize
        loadDeviceConfig();
        setInterval(updateStatus, 1000);
        updateStatus();
    </script>
</body>
</html>
