<!DOCTYPE html>
<html lang="en" data-theme="dark">
<script>(function(){var t=localStorage.getItem('theme')||'catppuccin-mocha';document.documentElement.setAttribute('data-theme-palette',t);if(['catppuccin-latte'].includes(t))document.documentElement.setAttribute('data-theme','light');})()</script>
<head>
    <title>Lame Data</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        header {
            text-align: center;
            margin-bottom: 1rem;
        }
        header h1 {
            margin-bottom: 0.75rem;
        }
        .status-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem;
            border-radius: var(--pico-border-radius);
            text-align: center;
            margin: 1rem 0;
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--pico-muted-border-color);
        }
        .metric-row:last-child {
            border-bottom: none;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Horse diagram */
        .horse-diagram {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto;
            gap: 0.5rem;
            max-width: 340px;
            margin: 0 auto;
        }
        .horse-pos {
            padding: 0.5rem 0.25rem;
            border-radius: var(--pico-border-radius);
            text-align: center;
            font-size: 0.8rem;
            border: 2px solid transparent;
            min-height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .horse-pos .pos-label {
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .horse-pos .pos-detail {
            font-size: 0.7rem;
            margin-top: 2px;
            opacity: 0.85;
        }
        .pos-none {
            background: var(--ctp-surface0);
            color: var(--ctp-overlay0);
            border-color: var(--ctp-surface1);
        }
        .pos-red {
            background: color-mix(in srgb, var(--ctp-red) 20%, var(--ctp-base));
            color: var(--ctp-red);
            border-color: var(--ctp-red);
        }
        .pos-yellow {
            background: color-mix(in srgb, var(--ctp-yellow) 20%, var(--ctp-base));
            color: var(--ctp-yellow);
            border-color: var(--ctp-yellow);
        }
        .pos-green {
            background: color-mix(in srgb, var(--ctp-green) 20%, var(--ctp-base));
            color: var(--ctp-green);
            border-color: var(--ctp-green);
        }
        /* Grid placement */
        .pos-poll     { grid-column: 2; }
        .pos-lf       { grid-column: 1; }
        .pos-rf       { grid-column: 3; }
        .pos-withers  { grid-column: 2; }
        .pos-girth    { grid-column: 2; }
        .pos-lh       { grid-column: 1; }
        .pos-rh       { grid-column: 3; }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>Lame Data</h1>
            <div class="nav-bar">
                <a href="/" class="active">Recorder</a>
                <a href="/sessions">Sessions</a>
                <a href="/settings">Settings</a>
            </div>
        </header>

        <article>
            <div class="horse-diagram" id="horseDiagram">
                <div class="horse-pos pos-poll pos-none" id="hp-poll">
                    <span class="pos-label">Poll</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-lf pos-none" id="hp-left_front">
                    <span class="pos-label">Left Front</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-rf pos-none" id="hp-right_front">
                    <span class="pos-label">Right Front</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-withers pos-none" id="hp-withers">
                    <span class="pos-label">Withers</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-girth pos-none" id="hp-girth">
                    <span class="pos-label">Girth</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-lh pos-none" id="hp-left_rear">
                    <span class="pos-label">Left Hind</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-rh pos-none" id="hp-right_rear">
                    <span class="pos-label">Right Hind</span>
                    <span class="pos-detail">---</span>
                </div>
            </div>
        </article>

        <article>
            <div id="status" class="status-indicator status-stopped">NOT RECORDING</div>

            <div id="metrics" style="display:none;">
                <div class="metric-row">
                    <span>Duration:</span>
                    <strong id="duration">0s</strong>
                </div>
                <div class="metric-row">
                    <span>Samples:</span>
                    <strong id="samples">0</strong>
                </div>
                <div class="metric-row">
                    <span>Synced Devices:</span>
                    <strong id="syncCount">0</strong>
                </div>
                <div style="margin-top: 0.5rem;">
                    <button id="resyncBtn" class="outline" onclick="triggerResync()" disabled>Re-sync Sensors</button>
                </div>
            </div>

            <label for="location" style="margin-top:1rem;">Session Location</label>
            <input type="text" id="location" placeholder="e.g., Indoor arena, outdoor field" value="field">

            <label for="notes">Notes</label>
            <textarea id="notes" rows="2" placeholder="e.g., Walk in hand, Trot in hand, Lunge left, etc."></textarea>

            <div class="btn-group">
                <button id="startBtn" onclick="startRecording()">Start Recording</button>
                <button id="stopBtn" class="btn-stop" onclick="stopRecording()" disabled>Stop Recording</button>
            </div>
        </article>

        <footer>
            <small>Lame Data - Open Source Horse Biomechanics</small>
        </footer>

    </main>

    <script>
        let isRecording = false;
        let deviceConfig = null;
        // Reverse map: position -> deviceId
        let positionMap = {};

        async function loadDeviceConfig() {
            const response = await fetch('/api/device_config');
            deviceConfig = await response.json();
            // Build position -> deviceId lookup
            positionMap = {};
            for (const [deviceId, dev] of Object.entries(deviceConfig.devices || {})) {
                if (dev.position) {
                    positionMap[dev.position] = deviceId;
                }
            }
        }

        function updateHorseDiagram(deviceStatus) {
            const positions = ['poll', 'left_front', 'right_front', 'withers', 'girth', 'left_rear', 'right_rear'];

            for (const pos of positions) {
                const el = document.getElementById('hp-' + pos);
                if (!el) continue;

                const deviceId = positionMap[pos];
                const detail = el.querySelector('.pos-detail');

                if (!deviceId) {
                    // No sensor assigned to this position
                    el.className = el.className.replace(/pos-(none|red|yellow|green)/, 'pos-none');
                    detail.textContent = '---';
                    continue;
                }

                const status = deviceStatus[deviceId];
                let colorClass, detailText;

                if (!status || !status.connected) {
                    colorClass = 'pos-red';
                    detailText = deviceId + ' (offline)';
                } else if (status.percent < 50) {
                    colorClass = 'pos-yellow';
                    detailText = deviceId + ' ' + status.percent.toFixed(0) + '%';
                } else {
                    colorClass = 'pos-green';
                    detailText = deviceId + ' ' + status.percent.toFixed(0) + '%';
                }

                el.className = el.className.replace(/pos-(none|red|yellow|green)/, colorClass);
                detail.textContent = detailText;
            }
        }

        function updateStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    isRecording = data.is_recording;

                    const statusDiv = document.getElementById('status');
                    if (isRecording) {
                        statusDiv.textContent = 'RECORDING';
                        statusDiv.className = 'status-indicator status-recording';
                        document.getElementById('metrics').style.display = 'block';
                        document.getElementById('duration').textContent = Math.floor(data.duration) + 's';
                        document.getElementById('samples').textContent = data.samples_received.toLocaleString();
                        const syncCount = Object.keys(data.sync_offsets || {}).length;
                        document.getElementById('syncCount').textContent = syncCount;
                        document.getElementById('resyncBtn').disabled = false;
                    } else {
                        document.getElementById('resyncBtn').disabled = true;
                        statusDiv.textContent = 'NOT RECORDING';
                        statusDiv.className = 'status-indicator status-stopped';
                        document.getElementById('metrics').style.display = 'none';
                    }

                    document.getElementById('startBtn').disabled = isRecording;
                    document.getElementById('stopBtn').disabled = !isRecording;
                    document.getElementById('location').disabled = isRecording;
                    document.getElementById('notes').disabled = isRecording;

                    updateHorseDiagram(data.device_status || {});
                });
        }

        function startRecording() {
            const location = document.getElementById('location').value;
            const notes = document.getElementById('notes').value;

            fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({location, notes})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) updateStatus();
            });
        }

        function stopRecording() {
            fetch('/api/stop', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`Recording stopped!\nDuration: ${Math.floor(data.duration)}s\nSamples: ${data.samples_recorded.toLocaleString()}`);
                    updateStatus();
                }
            });
        }

        function triggerResync() {
            fetch('/api/sync', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) document.getElementById('syncCount').textContent = '0';
                });
        }

        // Initialize
        loadDeviceConfig().then(() => {
            updateStatus();
            setInterval(updateStatus, 1000);
        });
    </script>
</body>
</html>
