<!DOCTYPE html>
<html lang="en" data-theme="dark">
<script>(function(){var t=localStorage.getItem('theme')||'catppuccin-mocha';document.documentElement.setAttribute('data-theme-palette',t);if(['catppuccin-latte'].includes(t))document.documentElement.setAttribute('data-theme','light');})()</script>
<head>
    <title>Lame Data</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        header {
            text-align: center;
            margin-bottom: 1rem;
        }
        header h1 {
            margin-bottom: 0.75rem;
        }
        .status-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem;
            border-radius: var(--pico-border-radius);
            text-align: center;
            margin: 1rem 0;
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--pico-muted-border-color);
        }
        .metric-row:last-child {
            border-bottom: none;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Horse diagram */
        .horse-diagram {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto;
            gap: 0.5rem;
            max-width: 340px;
            margin: 0 auto;
        }
        .horse-pos {
            padding: 0.5rem 0.25rem;
            border-radius: var(--pico-border-radius);
            text-align: center;
            font-size: 0.8rem;
            border: 2px solid transparent;
            min-height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .horse-pos .pos-label {
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .horse-pos .pos-detail {
            font-size: 0.7rem;
            margin-top: 2px;
            opacity: 0.85;
        }
        .pos-none {
            background: var(--ctp-surface0);
            color: var(--ctp-overlay0);
            border-color: var(--ctp-surface1);
        }
        .pos-red {
            background: color-mix(in srgb, var(--ctp-red) 20%, var(--ctp-base));
            color: var(--ctp-red);
            border-color: var(--ctp-red);
        }
        .pos-yellow {
            background: color-mix(in srgb, var(--ctp-yellow) 20%, var(--ctp-base));
            color: var(--ctp-yellow);
            border-color: var(--ctp-yellow);
        }
        .pos-green {
            background: color-mix(in srgb, var(--ctp-green) 20%, var(--ctp-base));
            color: var(--ctp-green);
            border-color: var(--ctp-green);
        }
        /* Grid placement */
        .pos-poll     { grid-column: 2; }
        .pos-lf       { grid-column: 1; }
        .pos-rf       { grid-column: 3; }
        .pos-withers  { grid-column: 2; }
        .pos-girth    { grid-column: 2; }
        .pos-lh       { grid-column: 1; }
        .pos-rh       { grid-column: 3; }

        /* Protocols */
        #protocolRunner h4 {
            margin: 0 0 0.75rem 0;
        }
        .favorite-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.5rem;
        }
        .favorite-buttons.two {
            grid-template-columns: 1fr 1fr;
        }
        .favorite-buttons button {
            margin: 0;
            padding: 1rem 0.75rem;
            font-size: 1rem;
            font-weight: bold;
            white-space: normal;
        }
        .manage-link {
            display: block;
            text-align: right;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }
        .no-favorites {
            color: var(--pico-muted-color);
            font-size: 0.9rem;
        }
        .run-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }
        .run-progress {
            font-size: 0.85rem;
            color: var(--pico-muted-color);
        }
        .run-step-instruction {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            padding: 1rem 0.5rem;
            margin: 0.5rem 0;
            border-radius: var(--pico-border-radius);
            background: color-mix(in srgb, var(--pico-primary) 10%, var(--pico-card-background-color));
        }
        .run-iteration {
            text-align: center;
            font-size: 0.9rem;
            color: var(--pico-muted-color);
            margin-bottom: 0.5rem;
        }
        .run-primary {
            width: 100%;
            margin: 0.25rem 0;
        }
        .run-secondary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .run-secondary button {
            margin: 0;
            padding: 0.5rem 0.5rem;
            font-size: 0.9rem;
        }
        .run-cancel {
            width: 100%;
            margin-top: 0.5rem;
        }
        .manual-muted {
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>Lame Data</h1>
            <div class="nav-bar">
                <a href="/" class="active">Recorder</a>
                <a href="/sessions">Sessions</a>
                <a href="/protocols">Protocols</a>
                <a href="/settings">Settings</a>
            </div>
        </header>

        <article>
            <div class="horse-diagram" id="horseDiagram">
                <div class="horse-pos pos-poll pos-none" id="hp-poll">
                    <span class="pos-label">Poll</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-lf pos-none" id="hp-left_front">
                    <span class="pos-label">Left Front</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-rf pos-none" id="hp-right_front">
                    <span class="pos-label">Right Front</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-withers pos-none" id="hp-withers">
                    <span class="pos-label">Withers</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-girth pos-none" id="hp-girth">
                    <span class="pos-label">Girth</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-lh pos-none" id="hp-left_rear">
                    <span class="pos-label">Left Hind</span>
                    <span class="pos-detail">---</span>
                </div>
                <div class="horse-pos pos-rh pos-none" id="hp-right_rear">
                    <span class="pos-label">Right Hind</span>
                    <span class="pos-detail">---</span>
                </div>
            </div>
        </article>

        <article id="protocolRunner" data-mode="idle">
            <!-- Idle mode: favorite quick-access buttons -->
            <div id="runnerIdle">
                <h4>Protocols</h4>
                <div id="favoriteButtons" class="favorite-buttons"></div>
                <a href="/protocols" class="manage-link">Manage protocols &rarr;</a>
            </div>
            <!-- Running mode: step-by-step -->
            <div id="runnerActive" style="display:none;">
                <div class="run-header">
                    <strong id="runProtocolName"></strong>
                    <span class="run-progress" id="runProgress"></span>
                </div>
                <div class="run-step-instruction" id="runInstruction"></div>
                <div class="run-iteration" id="runIteration"></div>
                <button class="run-primary" id="runPrimaryBtn" onclick="onPrimaryClick()">Start Step</button>
                <div class="run-secondary">
                    <button class="secondary" id="runRepeatBtn" onclick="onRepeatClick()" disabled>Repeat</button>
                    <button class="secondary" id="runSkipBtn" onclick="onSkipClick()">Skip</button>
                    <button class="secondary" id="runNextBtn" onclick="onNextClick()" disabled>Next</button>
                </div>
                <button class="run-cancel secondary outline" onclick="onCancelClick()">Cancel Protocol</button>
            </div>
        </article>

        <article id="recordingArticle">
            <div id="status" class="status-indicator status-stopped">NOT RECORDING</div>

            <div id="metrics" style="display:none;">
                <div class="metric-row">
                    <span>Duration:</span>
                    <strong id="duration">0s</strong>
                </div>
                <div class="metric-row">
                    <span>Samples:</span>
                    <strong id="samples">0</strong>
                </div>
                <div class="metric-row">
                    <span>Synced Devices:</span>
                    <strong id="syncCount">0</strong>
                </div>
                <div style="margin-top: 0.5rem;">
                    <button id="resyncBtn" class="outline" onclick="triggerResync()" disabled>Re-sync Sensors</button>
                </div>
            </div>

            <div id="manualControls">
                <label for="location" style="margin-top:1rem;">Session Location</label>
                <input type="text" id="location" placeholder="e.g., Indoor arena, outdoor field" value="field">

                <label for="notes">Notes</label>
                <textarea id="notes" rows="2" placeholder="e.g., Walk in hand, Trot in hand, Lunge left, etc."></textarea>

                <div class="btn-group">
                    <button id="startBtn" onclick="startRecording()">Start Recording</button>
                    <button id="stopBtn" class="btn-stop" onclick="stopRecording()" disabled>Stop Recording</button>
                </div>
            </div>
        </article>

        <footer>
            <small>Lame Data - Open Source Horse Biomechanics</small>
        </footer>

    </main>

    <script>
        let isRecording = false;
        let deviceConfig = null;
        // Reverse map: position -> deviceId
        let positionMap = {};

        async function loadDeviceConfig() {
            const response = await fetch('/api/device_config');
            deviceConfig = await response.json();
            // Build position -> deviceId lookup
            positionMap = {};
            for (const [deviceId, dev] of Object.entries(deviceConfig.devices || {})) {
                if (dev.position) {
                    positionMap[dev.position] = deviceId;
                }
            }
        }

        function updateHorseDiagram(deviceStatus) {
            const positions = ['poll', 'left_front', 'right_front', 'withers', 'girth', 'left_rear', 'right_rear'];

            for (const pos of positions) {
                const el = document.getElementById('hp-' + pos);
                if (!el) continue;

                const deviceId = positionMap[pos];
                const detail = el.querySelector('.pos-detail');

                if (!deviceId) {
                    // No sensor assigned to this position
                    el.className = el.className.replace(/pos-(none|red|yellow|green)/, 'pos-none');
                    detail.textContent = '---';
                    continue;
                }

                const status = deviceStatus[deviceId];
                let colorClass, detailText;

                if (!status || !status.connected) {
                    colorClass = 'pos-red';
                    detailText = deviceId + ' (offline)';
                } else if (status.percent < 50) {
                    colorClass = 'pos-yellow';
                    detailText = deviceId + ' ' + status.percent.toFixed(0) + '%';
                } else {
                    colorClass = 'pos-green';
                    detailText = deviceId + ' ' + status.percent.toFixed(0) + '%';
                }

                el.className = el.className.replace(/pos-(none|red|yellow|green)/, colorClass);
                detail.textContent = detailText;
            }
        }

        function updateStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    isRecording = data.is_recording;

                    const statusDiv = document.getElementById('status');
                    if (isRecording) {
                        statusDiv.textContent = 'RECORDING';
                        statusDiv.className = 'status-indicator status-recording';
                        document.getElementById('metrics').style.display = 'block';
                        document.getElementById('duration').textContent = Math.floor(data.duration) + 's';
                        document.getElementById('samples').textContent = data.samples_received.toLocaleString();
                        const syncCount = Object.keys(data.sync_offsets || {}).length;
                        document.getElementById('syncCount').textContent = syncCount;
                        document.getElementById('resyncBtn').disabled = false;
                    } else {
                        document.getElementById('resyncBtn').disabled = true;
                        statusDiv.textContent = 'NOT RECORDING';
                        statusDiv.className = 'status-indicator status-stopped';
                        document.getElementById('metrics').style.display = 'none';
                    }

                    document.getElementById('startBtn').disabled = isRecording;
                    document.getElementById('stopBtn').disabled = !isRecording;
                    document.getElementById('location').disabled = isRecording;
                    document.getElementById('notes').disabled = isRecording;

                    updateHorseDiagram(data.device_status || {});
                    renderRunner();
                });
        }

        function startRecording() {
            const location = document.getElementById('location').value;
            const notes = document.getElementById('notes').value;

            fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({location, notes})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) updateStatus();
            });
        }

        function stopRecording() {
            fetch('/api/stop', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`Recording stopped!\nDuration: ${Math.floor(data.duration)}s\nSamples: ${data.samples_recorded.toLocaleString()}`);
                    updateStatus();
                }
            });
        }

        function triggerResync() {
            fetch('/api/sync', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) document.getElementById('syncCount').textContent = '0';
                });
        }

        // ---- Protocols ----
        let allProtocols = [];
        let activeRun = null; // {protocol, location, stepIndex, iteration, stepHasRecording, stepsRecorded}

        async function loadProtocols() {
            try {
                const r = await fetch('/api/protocols');
                const data = await r.json();
                allProtocols = data.protocols || [];
            } catch (e) {
                allProtocols = [];
            }
            renderFavorites();
        }

        function renderFavorites() {
            const container = document.getElementById('favoriteButtons');
            const favs = allProtocols.filter(p => p.is_favorite).slice(0, 2);
            if (favs.length === 0) {
                container.innerHTML = '<div class="no-favorites">No favorite protocols yet. Favorite one on the Protocols page to pin it here.</div>';
                container.classList.remove('two');
                return;
            }
            container.classList.toggle('two', favs.length === 2);
            container.innerHTML = favs.map(p =>
                `<button onclick="startProtocolRun('${p.id}')">${escapeAttr(p.name)}</button>`
            ).join('');
        }

        function escapeAttr(s) {
            return (s || '').replace(/[&<>"']/g, c =>
                ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function startProtocolRun(protoId) {
            const proto = allProtocols.find(p => p.id === protoId);
            if (!proto) return;
            if (!proto.steps || proto.steps.length === 0) {
                alert('This protocol has no steps.');
                return;
            }
            const lastLoc = localStorage.getItem('lastProtocolLocation') || document.getElementById('location').value || 'field';
            const location = prompt(`Location for "${proto.name}":`, lastLoc);
            if (location === null) return;
            const loc = location.trim() || lastLoc;
            localStorage.setItem('lastProtocolLocation', loc);

            activeRun = {
                protocol: proto,
                location: loc,
                stepIndex: 0,
                iteration: 1,
                stepHasRecording: false,
                stepsRecorded: 0
            };
            document.getElementById('protocolRunner').dataset.mode = 'running';
            document.getElementById('runnerIdle').style.display = 'none';
            document.getElementById('runnerActive').style.display = 'block';
            document.getElementById('manualControls').classList.add('manual-muted');
            renderRunner();
        }

        function endProtocolRun(summary) {
            activeRun = null;
            document.getElementById('protocolRunner').dataset.mode = 'idle';
            document.getElementById('runnerIdle').style.display = 'block';
            document.getElementById('runnerActive').style.display = 'none';
            document.getElementById('manualControls').classList.remove('manual-muted');
            if (summary) alert(summary);
        }

        function ordinal(n) {
            const s = ['th', 'st', 'nd', 'rd'], v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        function renderRunner() {
            if (!activeRun) return;
            const { protocol, stepIndex, iteration, stepHasRecording } = activeRun;
            const step = protocol.steps[stepIndex];
            if (!step) return;

            document.getElementById('runProtocolName').textContent = protocol.name;
            document.getElementById('runProgress').textContent = `Step ${stepIndex + 1} of ${protocol.steps.length}`;
            document.getElementById('runInstruction').textContent = step.instruction;
            document.getElementById('runIteration').textContent =
                iteration > 1 ? `${ordinal(iteration)} iteration` : '';

            const primary = document.getElementById('runPrimaryBtn');
            const repeatBtn = document.getElementById('runRepeatBtn');
            const skipBtn = document.getElementById('runSkipBtn');
            const nextBtn = document.getElementById('runNextBtn');

            if (isRecording) {
                primary.textContent = 'End Step';
                primary.disabled = false;
                repeatBtn.disabled = true;
                skipBtn.disabled = true;
                nextBtn.disabled = true;
            } else if (stepHasRecording) {
                // Post-recording for this iteration: require Repeat / Next
                primary.textContent = 'Start Step';
                primary.disabled = true;
                repeatBtn.disabled = false;
                skipBtn.disabled = true;
                nextBtn.disabled = false;
            } else {
                // Fresh or post-Repeat: ready to start
                primary.textContent = 'Start Step';
                primary.disabled = false;
                repeatBtn.disabled = true;
                skipBtn.disabled = false;
                nextBtn.disabled = false; // allow skipping forward even without recording
            }
        }

        async function onPrimaryClick() {
            if (!activeRun) return;
            if (isRecording) {
                // End the current step's recording
                const r = await fetch('/api/stop', { method: 'POST' });
                const data = await r.json();
                if (data.success) {
                    activeRun.stepHasRecording = true;
                    activeRun.stepsRecorded += 1;
                    updateStatus();
                }
            } else {
                // Start recording this step
                const step = activeRun.protocol.steps[activeRun.stepIndex];
                const body = {
                    location: activeRun.location,
                    protocol_name: activeRun.protocol.name,
                    step_instruction: step.instruction,
                    iteration: activeRun.iteration
                };
                const r = await fetch('/api/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                const data = await r.json();
                if (data.success) updateStatus();
            }
        }

        function onRepeatClick() {
            if (!activeRun || isRecording) return;
            activeRun.iteration += 1;
            activeRun.stepHasRecording = false;
            renderRunner();
        }

        function advanceStep() {
            activeRun.stepIndex += 1;
            activeRun.iteration = 1;
            activeRun.stepHasRecording = false;
            if (activeRun.stepIndex >= activeRun.protocol.steps.length) {
                const count = activeRun.stepsRecorded;
                endProtocolRun(`Protocol complete — ${count} recording${count === 1 ? '' : 's'} saved.`);
                return;
            }
            renderRunner();
        }

        function onSkipClick() {
            if (!activeRun || isRecording || activeRun.stepHasRecording) return;
            advanceStep();
        }

        function onNextClick() {
            if (!activeRun || isRecording) return;
            advanceStep();
        }

        async function onCancelClick() {
            if (!activeRun) return;
            if (!confirm('Cancel this protocol run?')) return;
            if (isRecording) {
                await fetch('/api/stop', { method: 'POST' });
            }
            endProtocolRun(null);
            updateStatus();
        }

        // Initialize
        loadDeviceConfig()
            .then(loadProtocols)
            .then(() => {
                updateStatus();
                setInterval(updateStatus, 1000);
            });
    </script>
</body>
</html>
